services:
  postgres:
    image: postgres:16
    container_name: planner-postgres
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: planner-redis
    ports:
      - "6379:6379"
