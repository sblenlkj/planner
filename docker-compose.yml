services:
  backend:
    build:
      context: ./services/backend
    env_file:
      - ./services/backend/.env.example
    ports:
      - "8000:8000"

  agent:
    build:
      context: ./services/agent
    env_file:
      - ./services/agent/.env.example
    ports:
      - "8001:8000"

  telegram-gateway:
    build:
      context: ./services/telegram-gateway
    env_file:
      - ./services/telegram-gateway/.env.example
    ports:
      - "8002:8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
